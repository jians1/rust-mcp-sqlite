name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  BINARY_NAME: sqlite-mcp-rs
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-amd64
            static: false

          - arch: arm64
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-arm64
            static: false

          - arch: amd64
            target: x86_64-unknown-linux-musl
            asset_suffix: linux-amd64-musl
            static: true

          - arch: arm64
            target: aarch64-unknown-linux-musl
            asset_suffix: linux-arm64-musl
            static: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binary
        run: cargo zigbuild --locked --release --target "${{ matrix.target }}"

      - name: Verify binary
        shell: bash
        run: |
          set -euo pipefail

          binary="target/${{ matrix.target }}/release/${BINARY_NAME}"

          file "$binary"
          ldd "$binary" 2>&1 || true

          if [ "${{ matrix.static }}" = "true" ]; then
            if file "$binary" | grep -q "statically linked"; then
              echo "Static musl binary verified"
            else
              echo "Binary is not fully static" >&2
              exit 1
            fi
          else
            if file "$binary" | grep -q "dynamically linked"; then
              echo "Dynamic glibc binary verified"
            else
              echo "Expected dynamically linked glibc binary" >&2
              exit 1
            fi
          fi

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          package="${BINARY_NAME}-${{ inputs.tag }}-${{ matrix.asset_suffix }}"
          mkdir -p "dist/${package}"

          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${package}/${BINARY_NAME}"
          chmod +x "dist/${package}/${BINARY_NAME}"

          cp README.md "dist/${package}/README.md"

          if [ -f LICENSE ]; then
            cp LICENSE "dist/${package}/LICENSE"
          fi

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        shell: bash
        run: |
          find dist -maxdepth 2 -type f -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
